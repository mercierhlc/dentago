<body class="bg-background font-body text-on-surface overflow-hidden h-screen flex flex-col">

<!-- Main Content Area -->

<span class="text-[10px] font-black tracking-widest uppercase">SECURE ACCESS</span>
</div>
<!-- Typography Header -->
<div class="text-center space-y-2">
<h1 class="text-3xl font-headline font-extrabold text-on-surface">Welcome Back:</h1>
<p class="text-2xl cursive-accent text-primary">Log In to Your Account</p>
<p class="text-sm text-slate-500 font-medium max-w-[280px] mx-auto mt-2">Access your practice dashboard and supplier network.</p>
</div>
<!-- Auth Section -->
<div class="w-full space-y-6">
<button id="google-btn" class="w-full flex items-center justify-center gap-3 py-4 bg-white border border-slate-200 rounded-full hover:bg-slate-50 transition-all font-semibold text-on-surface text-sm">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign in with Google
                    </button>
<div class="relative flex items-center gap-4">
<div class="h-[1px] flex-1 bg-slate-100"></div>
<span class="text-[10px] font-black text-slate-400 tracking-widest uppercase">OR USE EMAIL</span>
<div class="h-[1px] flex-1 bg-slate-100"></div>
</div>
<div id="error-msg" class="hidden text-red-500 text-sm font-semibold text-center bg-red-50 rounded-xl px-4 py-3"></div>
<form id="login-form" class="space-y-4">
<div class="space-y-2">
<div class="relative group">
<input id="login-email" class="w-full bg-[#f8f9fc] border-none rounded-2xl py-4 px-6 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 transition-all font-medium" placeholder="Email Address" type="email"/>
</div>
<div class="relative group">
<input id="login-password" class="w-full bg-[#f8f9fc] border-none rounded-2xl py-4 px-6 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 transition-all font-medium" placeholder="Password" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button" onclick="const p=document.getElementById('login-password');p.type=p.type==='password'?'text':'password'">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-xs font-bold text-primary hover:underline" href="#">Forgot your password?</a>
</div>
</div>
</form>
</div>

<span class="material-symbols-outlined">arrow_back</span>

<p class="text-sm font-medium text-slate-500">
            Don't have an account? <a class="text-primary font-bold hover:underline" href="/onboarding/step1.html">Sign up</a>
</p>
<button id="login-btn" class="bg-primary text-white font-headline font-extrabold text-sm px-8 py-3 rounded-full flex items-center gap-3 shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
            Log In
            <span class="material-symbols-outlined">login</span>
</button>
</footer>
<script>
  const sbClient = window.supabase.createClient(
    'https://wybqjycfpauwlcrqgtfb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5YnFqeWNmcGF1d2xjcnFndGZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNjczNTMsImV4cCI6MjA5MTk0MzM1M30.E4zHiIcf71eGCrGFRiz3D0mLQiufmH-B_T7qtT6UUY8'
  );

  // Handle OAuth callback — Supabase puts the session in the URL hash after Google sign-in
  (async () => {
    const { data: { session } } = await sbClient.auth.getSession();
    if (session) {
      await redirectAfterLogin(session.user, session);
    }
  })();

  async function redirectAfterLogin(user, session) {
    // Check if they have a clinic_accounts record (fully onboarded)
    const { data: clinicAccount } = await sbClient
      .from('clinic_accounts')
      .select('id, clinic_name, email')
      .eq('auth_user_id', user.id)
      .single();

    if (clinicAccount) {
      // Bridge session into the Next.js auth system
      localStorage.setItem('dentago_token', session.access_token);
      localStorage.setItem('dentago_clinic', JSON.stringify({
        id: clinicAccount.id,
        clinic_name: clinicAccount.clinic_name,
        email: clinicAccount.email,
      }));
      window.location.href = '/search';
      return;
    }

    // Otherwise check where they left off in the onboarding flow
    const { data: profile } = await sbClient.from('clinic_profiles').select('id').eq('id', user.id).single();
    if (!profile) { window.location.href = '/onboarding/step2.html'; return; }
    const { data: docs } = await sbClient.from('clinic_documents').select('id').eq('user_id', user.id).limit(1);
    if (!docs || docs.length === 0) { window.location.href = '/onboarding/step3.html'; return; }
    window.location.href = '/onboarding/pending.html';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  document.getElementById('google-btn').addEventListener('click', async () => {
    const { error } = await sbClient.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/onboarding/login.html' }
    });
    if (error) showError(error.message);
  });

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = 'Logging in... <span class="material-symbols-outlined">hourglass_top</span>';

    const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.innerHTML = 'Log In <span class="material-symbols-outlined">login</span>';
      return;
    }
    redirectAfterLogin(data.user, data.session);
  });

  // Allow Enter key on password field
  document.getElementById('login-password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
</script>
</body></html>
